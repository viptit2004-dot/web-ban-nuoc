<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Highlands Reserve | Giỏ hàng</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="cart-page">
        <section class="cart-shell">
            <div class="cart-header">
                <div>
                    <p class="section-kicker">Giỏ hàng</p>
                    <h1>Đơn hàng của bạn</h1>
                    <p class="section-copy">Kiểm tra món đã chọn trước khi gửi order và payment qua gateway.</p>
                </div>
                <div class="cart-header-actions">
                    <a class="secondary-link" href="/">Tiếp tục chọn món</a>
                </div>
            </div>

            <div class="cart-layout">
                <section class="cart-items-panel">
                    <div id="cart-items" class="cart-items"></div>
                </section>

                <aside class="cart-summary-panel">
                    <div class="summary-card">
                        <p class="summary-label">Tạm tính</p>
                        <h2 id="cart-total">0 VND</h2>
                        <p id="cart-count-summary" class="summary-copy">0 món trong giỏ hàng</p>
                        <button id="checkout-button" type="button">Thanh toán tất cả</button>
                    </div>
                </aside>
            </div>
        </section>
    </main>

    <script src="script.js?v=4"></script>
</body>
</html>
